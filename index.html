<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>武侠标枪对决 - 巅峰排位</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; }
        
        /* 横屏强制提示 */
        #rotate-notice {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #8B0000; color: #FFD700; z-index: 999;
            flex-direction: column; justify-content: center; align-items: center;
            font-family: "STKaiti", "KaiTi", serif; text-align: center;
        }
        @media screen and (orientation: portrait) {
            #rotate-notice { display: flex; }
        }

        /* 字体设置 */
        @font-face {
            font-family: 'WuxiaFont';
            src: local('STKaiti'), local('KaiTi');
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="rotate-notice">
        <h1 style="font-size: 8vw;">请旋转手机</h1>
        <p style="font-size: 4vw;">进入横屏武侠世界</p>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 游戏配置 ---
const CFG = {
    gravity: 0.18,
    maxPower: 22,
    charScale: 2.0,
    spearLen: 120,
    platformY: 0.75,
    shakeDecay: 0.9,
    font: 'bold 20px STKaiti, KaiTi'
};

// --- 游戏状态 ---
let W, H;
let state = 'WAIT'; // WAIT, CHARGING, FLYING, AI_TURN, GAMEOVER
let turn = 'PLAYER';
let shake = 0;
let time = 0;
let particles = [];
let rankScore = 1200;

// --- 对象定义 ---
let player, ai, spear;

class Character {
    constructor(x, side, type) {
        this.x = x;
        this.side = side; // 1 for player, -1 for AI
        this.type = type; // 'nezha' or 'wusong'
        this.lives = 3;
        this.angle = side === 1 ? -Math.PI/6 : -Math.PI*0.8;
        this.power = 0;
        this.floatY = 0;
        this.level = type === 'nezha' ? 10 : 12;
    }

    draw() {
        this.floatY = Math.sin(time * 0.05) * 8;
        const cx = this.x;
        const cy = H * CFG.platformY - 50 + this.floatY;

        ctx.save();
        ctx.translate(cx, cy);

        // 1. 浮空平台
        ctx.fillStyle = '#3d2b1f';
        ctx.beginPath();
        ctx.ellipse(0, 70, 80, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 3;
        ctx.stroke();

        // 2. 角色渲染 (2.0倍放大)
        const s = CFG.charScale;
        ctx.scale(this.side, 1); // AI 镜像

        if (this.type === 'nezha') {
            // 红绸带动画
            ctx.strokeStyle = '#e63946';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(-10*s, 0);
            for(let i=0; i<15; i++) {
                ctx.lineTo(-20*s - i*8, Math.sin(time*0.15 + i)*12);
            }
            ctx.stroke();

            // 身体与丸子头
            ctx.fillStyle = '#f1faee'; // 肤色
            ctx.beginPath(); ctx.arc(0, -35*s, 12*s, 0, Math.PI*2); ctx.fill(); // 脸
            ctx.fillStyle = '#000'; // 头发
            ctx.beginPath(); ctx.arc(-10*s, -45*s, 6*s, 0, Math.PI*2); ctx.fill(); // 左丸子
            ctx.beginPath(); ctx.arc(10*s, -45*s, 6*s, 0, Math.PI*2); ctx.fill(); // 右丸子
            ctx.fillStyle = '#e63946'; // 红衣
            ctx.fillRect(-10*s, -25*s, 20*s, 30*s);
            // 额头火焰
            ctx.fillStyle = '#ffd700';
            ctx.beginPath(); ctx.arc(0, -38*s, 2, 0, Math.PI*2); ctx.fill();
        } else {
            // 武松
            ctx.fillStyle = '#2a3d66'; // 蓝衣
            ctx.fillRect(-12*s, -25*s, 24*s, 35*s);
            ctx.fillStyle = '#f1faee';
            ctx.beginPath(); ctx.arc(0, -38*s, 13*s, 0, Math.PI*2); ctx.fill(); // 脸
            ctx.fillStyle = '#333'; // 头巾
            ctx.fillRect(-15*s, -48*s, 30*s, 10*s);
            ctx.beginPath(); ctx.arc(0, -52*s, 5*s, 0, Math.PI*2); ctx.fill(); // 发髻
            // 鬓角
            ctx.fillStyle = '#111';
            ctx.fillRect(10*s, -35*s, 4, 12);
            ctx.fillRect(-14*s, -35*s, 4, 12);
        }

        ctx.restore();
    }
}

class Spear {
    constructor(x, y, angle, power, owner) {
        this.x = x; this.y = y;
        this.vx = Math.cos(angle) * power;
        this.vy = Math.sin(angle) * power;
        this.angle = angle;
        this.owner = owner;
        this.trail = [];
    }
    update() {
        this.trail.push({x: this.x, y: this.y});
        if(this.trail.length > 8) this.trail.shift();
        this.x += this.vx;
        this.y += this.vy;
        this.vy += CFG.gravity;
        this.angle = Math.atan2(this.vy, this.vx);
    }
    draw() {
        // 拖影
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 4;
        ctx.beginPath();
        this.trail.forEach((p, i) => { i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y); });
        ctx.stroke();

        // 标枪
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(-CFG.spearLen/2, 0); ctx.lineTo(CFG.spearLen/2, 0); ctx.stroke();
        ctx.fillStyle = '#FFD700'; // 金枪头
        ctx.beginPath();
        ctx.moveTo(CFG.spearLen/2, 0); ctx.lineTo(CFG.spearLen/2-20, -8); ctx.lineTo(CFG.spearLen/2-20, 8); ctx.fill();
        ctx.restore();
    }
}

// --- 逻辑函数 ---

function init() {
    resize();
    player = new Character(W * 0.2, 1, 'nezha');
    ai = new Character(W * 0.8, -1, 'wusong');
    loop();
}

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);

// 操作：仅左半侧触发
let startY = 0;
canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
canvas.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY));

function handleStart(x, y) {
    if (state !== 'WAIT' || turn !== 'PLAYER' || x > W/2) return;
    state = 'CHARGING';
    startY = y;
}

canvas.addEventListener('mousemove', (e) => handleMove(e.clientY));
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    handleMove(e.touches[0].clientY);
}, {passive: false});

function handleMove(y) {
    if (state !== 'CHARGING') return;
    let dy = y - startY;
    player.angle = -Math.PI/6 + (dy * 0.005);
    player.power = Math.min(CFG.maxPower, player.power + 0.2);
}

canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchend', handleEnd);

function handleEnd() {
    if (state !== 'CHARGING') return;
    fire(player);
}

function fire(char) {
    const launchY = H * CFG.platformY - 100 + char.floatY;
    spear = new Spear(char.x, launchY, char.angle, char.power + 8, char === player ? 'PLAYER' : 'AI');
    char.power = 0;
    state = 'FLYING';
}

function aiLogic() {
    state = 'AI_THINKING';
    setTimeout(() => {
        // 简单AI公式：根据距离估算，带随机偏移
        const dx = player.x - ai.x;
        ai.angle = -Math.PI * 0.8 + (Math.random() - 0.5) * 0.2;
        ai.power = 12 + Math.random() * 8;
        fire(ai);
    }, 1500);
}

function createExplosion(x, y) {
    shake = 15;
    for(let i=0; i<20; i++) {
        particles.push({
            x, y, 
            vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
            life: 1, color: i % 2 === 0 ? '#FFD700' : '#FF4500'
        });
    }
}

// --- 渲染循环 ---

function loop() {
    time++;
    ctx.clearRect(0, 0, W, H);

    // 1. 背景：金黄色山水
    let sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#FFD700'); sky.addColorStop(1, '#FFA500');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // 远山剪影
    ctx.fillStyle = 'rgba(139, 69, 19, 0.2)';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.8);
    ctx.lineTo(W * 0.3, H * 0.4); ctx.lineTo(W * 0.6, H * 0.8);
    ctx.fill();
    // 宝塔
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(W * 0.7, H * 0.3, 40, 100);

    // 震屏
    ctx.save();
    if (shake > 0.1) {
        ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
        shake *= CFG.shakeDecay;
    }

    // 2. 绘制人物
    player.draw();
    ai.draw();

    // 3. 标枪逻辑
    if (state === 'FLYING' && spear) {
        spear.update();
        // 仅在屏幕内绘制
        if (spear.x > 0 && spear.x < W && spear.y < H) {
            spear.draw();
        } else if (spear.y > H || spear.x < 0 || spear.x > W) {
            // 飞出界，切换回合
            nextTurn();
        }

        // 碰撞检测
        let target = spear.owner === 'PLAYER' ? ai : player;
        let dist = Math.hypot(spear.x - target.x, spear.y - (H * CFG.platformY - 50 + target.floatY));
        if (dist < 50) {
            target.lives--;
            createExplosion(spear.x, spear.y);
            spear = null;
            if (target.lives <= 0) {
                state = 'GAMEOVER';
                setTimeout(() => {
                    alert(target === ai ? "大获全胜！声望 +50" : "技不如人，请大侠重新修炼");
                    location.reload();
                }, 1000);
            } else {
                nextTurn();
            }
        }
    }

    // 4. 粒子
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 5, 5);
    });
    particles = particles.filter(p => p.life > 0);
    ctx.globalAlpha = 1;

    ctx.restore();

    // 5. UI界面渲染
    drawUI();
    
    if (state === 'CHARGING') drawAim();

    requestAnimationFrame(loop);
}

function nextTurn() {
    spear = null;
    turn = turn === 'PLAYER' ? 'AI' : 'PLAYER';
    if (turn === 'AI') {
        aiLogic();
    } else {
        state = 'WAIT';
    }
}

function drawAim() {
    const launchY = H * CFG.platformY - 100 + player.floatY;
    ctx.save();
    // 虚线
    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.beginPath();
    ctx.moveTo(player.x, launchY);
    const tx = player.x + Math.cos(player.angle) * 200;
    const ty = launchY + Math.sin(player.angle) * 200;
    ctx.lineTo(tx, ty);
    ctx.stroke();

    // 准星
    ctx.setLineDash([]);
    ctx.strokeStyle = '#e63946';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(tx, ty, 15, 0, Math.PI*2);
    ctx.moveTo(tx-20, ty); ctx.lineTo(tx+20, ty);
    ctx.moveTo(tx, ty-20); ctx.lineTo(tx, ty+20);
    ctx.stroke();

    // 蓄力条 (右侧百分比)
    const p = player.power / CFG.maxPower;
    const barColor = p < 0.4 ? '#2ecc71' : (p < 0.8 ? '#f1c40f' : '#e74c3c');
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(player.x - 50, launchY + 80, 100, 15);
    ctx.fillStyle = barColor;
    ctx.fillRect(player.x - 50, launchY + 80, 100 * p, 15);
    ctx.fillStyle = '#fff';
    ctx.font = '14px WuxiaFont';
    ctx.fillText(Math.floor(p*100) + "%", player.x - 15, launchY + 115);
    ctx.restore();
}

function drawUI() {
    // 顶部排位分
    ctx.fillStyle = '#8B0000';
    ctx.fillRect(W/2 - 80, 0, 160, 40);
    ctx.strokeStyle = '#FFD700';
    ctx.strokeRect(W/2 - 80, 0, 160, 40);
    ctx.fillStyle = '#FFD700';
    ctx.font = CFG.font;
    ctx.textAlign = 'center';
    ctx.fillText(`巅峰赛: ${rankScore}`, W/2, 28);

    // 左右血条
    drawHealth(50, 50, player, 'PLAYER');
    drawHealth(W - 250, 50, ai, 'AI');
}

function drawHealth(x, y, char, label) {
    ctx.save();
    // 头像框
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#FFD700';
    ctx.fillStyle = '#5c0000';
    ctx.beginPath(); ctx.arc(label==='PLAYER'?x:x+200, y+20, 35, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    
    // 等级
    ctx.fillStyle = '#FFD700';
    ctx.font = '16px WuxiaFont';
    ctx.fillText(`Lv.${char.level}`, label==='PLAYER'?x:x+200, y+70);

    // 血条背景
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(label==='PLAYER'?x+45:x-5, y, 150, 20);
    // 红色血条
    ctx.fillStyle = '#e63946';
    ctx.fillRect(label==='PLAYER'?x+45:x-5, y, (char.lives/3)*150, 20);
    
    // 爱心
    for(let i=0; i<3; i++) {
        ctx.fillStyle = i < char.lives ? '#e63946' : '#333';
        ctx.font = '24px Arial';
        ctx.fillText('❤', label==='PLAYER' ? (x+45+i*35) : (x+120-i*35), y+45);
    }
    ctx.restore();
}

init();
</script>
</body>
</html>
