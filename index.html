<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>古风标枪对战</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #f4d03f; /* 背景兜底色 */
            font-family: 'Microsoft YaHei', sans-serif;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #f39c12, #e67e22);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            background: transparent;
        }
        /* UI 层 */
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }
        .player-info {
            width: 200px;
            text-align: center;
        }
        .hp-bar-bg {
            width: 100%;
            height: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #fff;
        }
        .hp-bar-fill {
            height: 100%;
            width: 100%;
            background: #e74c3c;
            transition: width 0.3s;
        }
        .name { color: white; font-weight: bold; margin-bottom: 5px; text-shadow: 1px 1px 2px #000; }
        #center-info { text-align: center; color: white; }
        #timer { font-size: 24px; font-weight: bold; }
        #turn-hint { font-size: 14px; background: rgba(0,0,0,0.5); padding: 2px 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="player-info">
            <div class="name">玩家 (哪吒)</div>
            <div class="hp-bar-bg"><div id="p1-hp" class="hp-bar-fill"></div></div>
            <div id="p1-hp-text" style="color:white; font-size:12px;">600/600</div>
        </div>
        <div id="center-info">
            <div id="timer">04:59</div>
            <div id="turn-hint">玩家回合</div>
        </div>
        <div class="player-info">
            <div class="name">电脑 (武松)</div>
            <div class="hp-bar-bg"><div id="p2-hp" class="hp-bar-fill"></div></div>
            <div id="p2-hp-text" style="color:white; font-size:12px;">600/600</div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
/**
 * 游戏配置与状态
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let width, height;
let gameState = 'aiming'; // aiming, flying, ai_turn
let turn = 'player'; // player, ai

const gravity = 0.25;
const players = {
    p1: { x: 0, y: 0, hp: 600, maxHp: 600, color: '#3498db', platformW: 150 },
    p2: { x: 0, y: 0, hp: 600, maxHp: 600, color: '#2ecc71', platformW: 150 }
};

let spear = { x: 0, y: 0, vx: 0, vy: 0, active: false, angle: 0 };
let mouse = { x: 0, y: 0, isDown: false, startX: 0, startY: 0 };

// 初始化画布
function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;

    // 设置角色位置
    players.p1.x = width * 0.2;
    players.p1.y = height * 0.7;
    players.p2.x = width * 0.8;
    players.p2.y = height * 0.7;
}

/**
 * 绘制逻辑
 */
function drawPlatform(x, y, w) {
    ctx.fillStyle = '#8d6e63';
    ctx.beginPath();
    ctx.moveTo(x - w/2, y);
    ctx.lineTo(x + w/2, y);
    ctx.lineTo(x + w/4, y + 100);
    ctx.lineTo(x - w/4, y + 100);
    ctx.closePath();
    ctx.fill();
}

function drawCharacter(player, isFlip) {
    ctx.save();
    ctx.translate(player.x, player.y - 40);
    if(isFlip) ctx.scale(-1, 1);
    
    // 简易火柴人/几何体替代图中的角色
    ctx.fillStyle = "#333";
    ctx.fillRect(-10, -40, 20, 40); // 身体
    ctx.beginPath();
    ctx.arc(0, -50, 15, 0, Math.PI*2); // 头
    ctx.fill();
    ctx.restore();
}

function drawSpear(x, y, vx, vy) {
    let angle = Math.atan2(vy, vx);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(20, 0);
    ctx.stroke();
    // 枪尖
    ctx.fillStyle = '#bdc3c7';
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(10, -5);
    ctx.lineTo(10, 5);
    ctx.fill();
    ctx.restore();
}

function drawTrajectory() {
    if (!mouse.isDown || turn !== 'player') return;
    
    let dx = (mouse.startX - mouse.x) * 0.15;
    let dy = (mouse.startY - mouse.y) * 0.15;
    
    ctx.beginPath();
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    
    let tx = players.p1.x, ty = players.p1.y - 50;
    let tvx = dx, tvy = dy;
    
    for (let i = 0; i < 30; i++) {
        ctx.lineTo(tx, ty);
        tx += tvx * 2;
        ty += tvy * 2;
        tvy += gravity * 2;
    }
    ctx.stroke();
    ctx.setLineDash([]);
}

/**
 * 游戏逻辑更新
 */
function update() {
    if (spear.active) {
        spear.x += spear.vx;
        spear.y += spear.vy;
        spear.vy += gravity;

        // 检测命中
        let target = (turn === 'player') ? players.p2 : players.p1;
        let dist = Math.hypot(spear.x - target.x, spear.y - (target.y - 40));
        
        if (dist < 40) {
            target.hp -= 120;
            updateUI();
            resetSpear();
        } else if (spear.y > height || spear.x < 0 || spear.x > width) {
            resetSpear();
        }
    }
}

function resetSpear() {
    spear.active = false;
    if (turn === 'player') {
        turn = 'ai';
        document.getElementById('turn-hint').innerText = "电脑回合...";
        setTimeout(aiMove, 1500);
    } else {
        turn = 'player';
        document.getElementById('turn-hint').innerText = "玩家回合";
    }
}

function aiMove() {
    spear.active = true;
    spear.x = players.p2.x;
    spear.y = players.p2.y - 50;
    
    // AI 算法：计算玩家方向，加一点点随机扰动
    let targetX = players.p1.x;
    let targetY = players.p1.y - 50;
    let dx = targetX - spear.x;
    let dy = targetY - spear.y - 100; // 向上瞄准一点以应对重力
    
    spear.vx = dx * 0.04 + (Math.random() - 0.5) * 2; 
    spear.vy = dy * 0.04 - 5; 
}

function updateUI() {
    document.getElementById('p1-hp').style.width = (players.p1.hp / players.p1.maxHp * 100) + "%";
    document.getElementById('p2-hp').style.width = (players.p2.hp / players.p2.maxHp * 100) + "%";
    document.getElementById('p1-hp-text').innerText = `${Math.max(0, players.p1.hp)}/600`;
    document.getElementById('p2-hp-text').innerText = `${Math.max(0, players.p2.hp)}/600`;
    
    if(players.p1.hp <= 0) alert("你输了！");
    if(players.p2.hp <= 0) alert("你赢了！");
}

function loop() {
    ctx.clearRect(0, 0, width, height);
    
    // 绘背景装饰（简单的远山）
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    ctx.beginPath();
    ctx.moveTo(0, height);
    ctx.lineTo(width/2, height*0.4);
    ctx.lineTo(width, height);
    ctx.fill();

    drawPlatform(players.p1.x, players.p1.y, players.p1.platformW);
    drawPlatform(players.p2.x, players.p2.y, players.p2.platformW);
    
    drawCharacter(players.p1, false);
    drawCharacter(players.p2, true);
    
    drawTrajectory();
    
    if (spear.active) {
        drawSpear(spear.x, spear.y, spear.vx, spear.vy);
    }
    
    update();
    requestAnimationFrame(loop);
}

/**
 * 事件监听
 */
window.addEventListener('mousedown', e => {
    if (turn !== 'player' || spear.active) return;
    mouse.isDown = true;
    mouse.startX = e.clientX;
    mouse.startY = e.clientY;
});

window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener('mouseup', e => {
    if (!mouse.isDown) return;
    mouse.isDown = false;
    
    spear.active = true;
    spear.x = players.p1.x;
    spear.y = players.p1.y - 50;
    // 弹弓效应：拉得越远弹得越快
    spear.vx = (mouse.startX - e.clientX) * 0.15;
    spear.vy = (mouse.startY - e.clientY) * 0.15;
});

// 处理窗口缩放
window.addEventListener('resize', init);

// 启动
init();
loop();

</script>
</body>
</html>
