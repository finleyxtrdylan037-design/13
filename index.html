<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>标枪对决 - 武林争霸</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f1c40f;
            --red: #c0392b;
            --dark: #2c3e50;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-touch-callout: none; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background-color: #000; font-family: 'ZCOOL KuaiLe', cursive;
        }
        canvas { display: block; background: #222; }

        /* 旋转提示 */
        #rotate-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center;
        }
        @media (orientation: portrait) {
            #rotate-overlay { display: flex; }
        }

        /* UI层 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .btn {
            pointer-events: auto; cursor: pointer;
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            border: 2px solid var(--gold); border-radius: 8px;
            color: var(--gold); font-family: 'Ma Shan Zheng', cursive;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }

        /* 难度选择面板 */
        #difficulty-panel {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px; pointer-events: auto;
        }
        .diff-btn {
            width: 80px; height: 40px; font-size: 18px; opacity: 0.6;
        }
        .diff-btn.active { opacity: 1; box-shadow: 0 0 15px var(--gold); }

        /* 启动和结束界面 */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #f39c12, #8e44ad); /* 初始金紫渐变 */
            z-index: 100; pointer-events: auto;
        }
        #start-screen { background: radial-gradient(circle, #f1c40f, #784212); }
        h1 { font-family: 'Ma Shan Zheng', cursive; font-size: 80px; color: #fff; text-shadow: 4px 4px 0 var(--red); margin-bottom: 10px; }
        p { color: #fff; margin-bottom: 30px; letter-spacing: 5px; }
        .start-btn { padding: 15px 50px; font-size: 32px; }

        #end-screen { display: none; background: rgba(0,0,0,0.8); }
        #end-status { font-size: 100px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="rotate-overlay">
        <div style="font-size: 50px;">🔄</div>
        <p>请旋转手机以横屏体验武林对决</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="difficulty-panel">
            <button class="btn diff-btn" onclick="setDifficulty(0)">简单</button>
            <button class="btn diff-btn active" onclick="setDifficulty(1)">普通</button>
            <button class="btn diff-btn" onclick="setDifficulty(2)">困难</button>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1>标枪对决</h1>
        <p>武林争霸 · 一决高下</p>
        <button class="btn start-btn" onclick="startGame()">开始对战</button>
        <div style="color:rgba(255,255,255,0.7); margin-top:20px; font-size:14px;">操作：在左侧拖动瞄准，松开投掷</div>
    </div>

    <div id="end-screen" class="screen">
        <h1 id="end-status">胜利！</h1>
        <p id="final-score">总比分 1 : 0</p>
        <button class="btn start-btn" onclick="resetGame()">再来一局</button>
    </div>

<script>
/** * 游戏配置与常量
 */
const BASE_W = 1400;
const BASE_H = 700;
const GRAVITY = 0.35;
const MAX_POWER_TIME = 1500; // 1.5秒满力
const HEAD_RADIUS = 25;
const TORSO_W = 40;
const TORSO_H = 60;
const LEG_RADIUS = 15;

const DIFF_SETTINGS = [
    { name: '简单', error: 14 },
    { name: '普通', error: 7 },
    { name: '困难', error: 2.5 }
];

/**
 * 全局状态
 */
let canvas, ctx;
let S = 1; // 缩放系数
let gameState = 'START';
let difficulty = 1;
let score = { player: 0, ai: 0 };
let particles = [];
let hitTexts = [];
let screenShake = 0;

// 图片加载
const images = {};
function loadAssets() {
    const toLoad = { 'nezha': 'nezha.png', 'wusong': 'wusong.png' };
    let loaded = 0;
    for (let key in toLoad) {
        images[key] = new Image();
        images[key].src = toLoad[key];
        images[key].onload = () => { loaded++; };
        images[key].onerror = () => { images[key] = null; loaded++; }; // 允许无图运行
    }
}

/**
 * 角色类
 */
class Character {
    constructor(isPlayer) {
        this.isPlayer = isPlayer;
        this.reset();
    }

    reset() {
        this.hp = 600;
        this.lives = 3;
        this.state = 'IDLE'; // IDLE, CHARGING, THROWING, HURT
        this.x = this.isPlayer ? 250 : BASE_W - 250;
        this.y = 450;
        this.platformY = 480;
        this.floatOffset = 0;
        this.angle = 0;
        this.power = 0;
        this.chargeStart = 0;
        this.shakeTime = 0;
        this.lastAiAction = Date.now() + 1000;
        this.spriteFrame = 0;
        this.spriteTimer = 0;
    }

    update() {
        // 浮动动画
        this.floatOffset = Math.sin(Date.now() / 1000) * 5;
        this.y = 450 + this.floatOffset;

        // 抖动处理
        if (this.shakeTime > 0) this.shakeTime--;

        // AI 逻辑
        if (!this.isPlayer && gameState === 'PLAYING' && this.state === 'IDLE') {
            if (Date.now() > this.lastAiAction) {
                this.startCharging();
            }
        }
        if (!this.isPlayer && this.state === 'CHARGING') {
            // AI 蓄力模拟
            let elapsed = Date.now() - this.chargeStart;
            if (elapsed > this.aiTargetTime) {
                this.release();
                this.lastAiAction = Date.now() + 1500 + Math.random() * 1000;
            }
        }
    }

    startCharging() {
        this.state = 'CHARGING';
        this.chargeStart = Date.now();
        if (!this.isPlayer) {
            // AI 预测弹道
            this.angle = this.predictAngle();
            // 加上难度误差
            const error = (Math.random() - 0.5) * 2 * DIFF_SETTINGS[difficulty].error;
            this.angle += (error * Math.PI / 180);
            this.aiTargetTime = 400 + Math.random() * 800;
        }
    }

    predictAngle() {
        // 模拟法寻找最佳角度
        let bestAngle = 0;
        let minDist = 9999;
        const targetX = player.x;
        const targetY = player.y;
        const speed = 15 + 0.7 * 10; // 假设中等威力

        for (let a = -50; a < 50; a += 1) {
            let rad = a * Math.PI / 180;
            let vx = Math.cos(rad) * speed * (this.isPlayer ? 1 : -1);
            let vy = Math.sin(rad) * speed;
            let curX = this.x, curY = this.y;
            
            // 简单轨迹步进
            for(let t=0; t<100; t++) {
                curX += vx; curY += vy; vy += GRAVITY;
                if (Math.abs(curX - targetX) < 20) {
                    let dist = Math.abs(curY - targetY);
                    if (dist < minDist) { minDist = dist; bestAngle = rad; }
                    break;
                }
            }
        }
        return bestAngle;
    }

    release() {
        let duration = Math.min(Date.now() - this.chargeStart, MAX_POWER_TIME);
        let powerPercent = duration / MAX_POWER_TIME;
        let speed = 16 + powerPercent * 12;
        
        spears.push(new Spear(
            this.x, this.y - 20, 
            this.angle, speed, this.isPlayer
        ));

        this.state = 'THROWING';
        setTimeout(() => { if(this.state === 'THROWING') this.state = 'IDLE'; }, 500);
    }

    takeDamage(isHeadshot) {
        const damage = isHeadshot ? 2 : 1;
        this.lives -= damage;
        this.hp -= damage * 200;
        this.state = 'HURT';
        this.shakeTime = 30;
        screenShake = 15;
        setTimeout(() => { if(this.lives > 0) this.state = 'IDLE'; }, 800);
        
        if (this.lives <= 0) {
            this.lives = 0;
            this.hp = 0;
            endGame(this.isPlayer ? 'AI' : 'PLAYER');
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 绘制阴影
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(0, this.platformY - this.y + 10, 40, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        if (this.shakeTime > 0 && Math.floor(Date.now()/50)%2) {
            ctx.translate((Math.random()-0.5)*10, 0);
        }

        // 绘制角色 (如果有图用图，没图用几何体)
        const img = this.isPlayer ? images.nezha : images.wusong;
        if (img) {
            this.drawSprite(img);
        } else {
            this.drawPlaceholder();
        }

        // 蓄力条
        if (this.state === 'CHARGING' && this.isPlayer) {
            let p = Math.min((Date.now() - this.chargeStart) / MAX_POWER_TIME, 1);
            this.drawPowerBar(p);
            this.drawAimLine();
        }

        ctx.restore();
    }

    drawSprite(img) {
        // 简化的精灵图裁剪逻辑
        // 假设 Nezha 精灵图宽度为 IDLE 4帧等
        let frameW = img.width / 10; 
        let frameH = img.height / 5;
        let sx = 0, sy = 0;

        if (this.state === 'IDLE') sx = (Math.floor(Date.now()/150)%4) * frameW;
        if (this.state === 'CHARGING') sx = 2 * frameW;
        if (this.state === 'HURT') { sy = img.height - frameH; sx = 0; }

        ctx.drawImage(img, sx, sy, frameW, frameH, -60, -100, 120, 120);
    }

    drawPlaceholder() {
        ctx.fillStyle = this.isPlayer ? '#e74c3c' : '#3498db';
        ctx.fillRect(-20, -80, 40, 80);
        ctx.fillStyle = '#f39c12';
        ctx.beginPath(); ctx.arc(0, -90, 20, 0, Math.PI*2); ctx.fill();
    }

    drawPowerBar(p) {
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(-40, -130, 80, 10);
        let color = `rgb(${p*255}, ${255-p*100}, 0)`;
        ctx.fillStyle = color;
        ctx.fillRect(-40, -130, 80 * p, 10);
        ctx.font = '12px Arial';
        ctx.fillText(Math.floor(p*100)+'%', 0, -135);
    }

    drawAimLine() {
        ctx.save();
        ctx.rotate(this.angle);
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.lineTo(300, 0);
        ctx.stroke();
        // 准星
        ctx.strokeStyle = 'red';
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(300, 0, 10, 0, Math.PI*2);
        ctx.stroke();
        ctx.moveTo(290, 0); ctx.lineTo(310, 0);
        ctx.moveTo(300, -10); ctx.lineTo(300, 10);
        ctx.stroke();
        ctx.restore();
    }
}

/**
 * 标枪类
 */
class Spear {
    constructor(x, y, angle, speed, fromPlayer) {
        this.x = x; this.y = y;
        this.vx = Math.cos(angle) * speed * (fromPlayer ? 1 : -1);
        this.vy = Math.sin(angle) * speed;
        this.fromPlayer = fromPlayer;
        this.history = [];
        this.active = true;
        this.angle = angle;
    }

    update() {
        this.history.push({x: this.x, y: this.y});
        if (this.history.length > 20) this.history.shift();

        this.x += this.vx;
        this.y += this.vy;
        this.vy += GRAVITY;
        this.angle = Math.atan2(this.vy, this.vx);

        if (this.x < 0 || this.x > BASE_W || this.y > BASE_H) this.active = false;

        // 碰撞检测
        let target = this.fromPlayer ? ai : player;
        if (this.checkCollision(target)) {
            this.active = false;
        }
    }

    checkCollision(target) {
        if (target.state === 'HURT') return false;

        // 头部检测
        let headDist = Math.hypot(this.x - target.x, this.y - (target.y - 70));
        if (headDist < HEAD_RADIUS) {
            target.takeDamage(true);
            this.createHitEffects(this.x, this.y, "爆头！");
            return true;
        }

        // 躯干检测 (矩形)
        if (this.x > target.x - TORSO_W/2 && this.x < target.x + TORSO_W/2 &&
            this.y > target.y - 60 && this.y < target.y) {
            target.takeDamage(false);
            this.createHitEffects(this.x, this.y, this.fromPlayer ? "命中！" : "被击中！");
            return true;
        }

        return false;
    }

    createHitEffects(x, y, text) {
        for(let i=0; i<20; i++) {
            particles.push({
                x, y, 
                vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                life: 1.0, color: ['#fff','#f1c40f','#e67e22','#e74c3c'][Math.floor(Math.random()*4)]
            });
        }
        hitTexts.push({ x, y: y-50, text, life: 1.0 });
    }

    draw() {
        // 拖尾
        if (this.history.length > 2) {
            ctx.beginPath();
            ctx.moveTo(this.history[0].x, this.history[0].y);
            for(let p of this.history) ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = 'rgba(241, 196, 15, 0.4)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        // 绘制标枪
        const len = 80;
        // 枪杆
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-len/2, 0); ctx.lineTo(len/2, 0); ctx.stroke();
        // 枪头
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath();
        ctx.moveTo(len/2, 0); ctx.lineTo(len/2-15, -6); ctx.lineTo(len/2-15, 6); ctx.fill();
        // 羽毛
        ctx.fillStyle = '#c0392b';
        ctx.fillRect(-len/2, -4, 15, 8);
        
        ctx.restore();
    }
}

/**
 * 核心游戏逻辑
 */
const player = new Character(true);
const ai = new Character(false);
let spears = [];

function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    window.addEventListener('resize', resize);
    resize();
    loadAssets();

    // 输入处理
    const handleStart = (e) => {
        if (gameState !== 'PLAYING') return;
        let pos = getTouchPos(e);
        if (pos.x < BASE_W / 2 * S) {
            player.startCharging();
            player.touchStart = pos;
        }
    };
    const handleMove = (e) => {
        if (player.state === 'CHARGING') {
            let pos = getTouchPos(e);
            let dy = pos.y - player.touchStart.y;
            // 映射：手指下滑 -> 标枪上抬
            player.angle = -dy / 200; 
            // 限制角度
            player.angle = Math.max(-Math.PI/3, Math.min(Math.PI/4, player.angle));
        }
    };
    const handleEnd = () => {
        if (player.state === 'CHARGING') player.release();
    };

    canvas.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e.touches[0]); }, {passive:false});
    window.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0]); }, {passive:false});
    window.addEventListener('touchend', handleEnd);

    requestAnimationFrame(loop);
}

function getTouchPos(e) {
    let rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function resize() {
    let w = window.innerWidth;
    let h = window.innerHeight;
    canvas.width = w;
    canvas.height = h;
    S = Math.min(w / BASE_W, h / BASE_H);
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    gameState = 'PLAYING';
    player.reset();
    ai.reset();
    spears = [];
}

function setDifficulty(d) {
    difficulty = d;
    document.querySelectorAll('.diff-btn').forEach((b, i) => {
        b.classList.toggle('active', i === d);
    });
}

function endGame(winner) {
    if (gameState === 'END') return;
    gameState = 'END';
    if (winner === 'PLAYER') score.player++; else score.ai++;
    
    setTimeout(() => {
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('end-status').innerText = winner === 'PLAYER' ? "胜利！" : "败北";
        document.getElementById('final-score').innerText = `总比分 ${score.player} : ${score.ai}`;
    }, 1500);
}

function resetGame() {
    document.getElementById('end-screen').style.display = 'none';
    startGame();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    if (gameState === 'PLAYING' || gameState === 'END') {
        player.update();
        ai.update();
        spears.forEach(s => s.update());
        spears = spears.filter(s => s.active);

        // 粒子更新
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        });
        particles = particles.filter(p => p.life > 0);

        hitTexts.forEach(t => { t.y -= 1; t.life -= 0.02; });
        hitTexts = hitTexts.filter(t => t.life > 0);

        if (screenShake > 0) screenShake *= 0.9;
    }
}

function draw() {
    ctx.clearRect(0,0, canvas.width, canvas.height);
    ctx.save();
    
    // 居中缩放
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(S, S);
    ctx.translate(-BASE_W/2, -BASE_H/2);

    // 震动
    if (screenShake > 0) ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);

    drawBackground();
    
    drawPlatform(250, 480 + player.floatOffset/2);
    drawPlatform(BASE_W - 250, 480 + ai.floatOffset/2);

    player.draw();
    ai.draw();
    spears.forEach(s => s.draw());

    // 绘制粒子
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // 绘制文字
    hitTexts.forEach(t => {
        ctx.globalAlpha = t.life;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 40px Ma Shan Zheng';
        ctx.shadowBlur = 10; ctx.shadowColor = 'red';
        ctx.textAlign = 'center';
        ctx.fillText(t.text, t.x, t.y);
        ctx.shadowBlur = 0;
    });
    ctx.globalAlpha = 1;

    drawHUD();
    ctx.restore();
}

function drawBackground() {
    let grad = ctx.createRadialGradient(BASE_W/2, BASE_H/3, 50, BASE_W/2, BASE_H/2, 600);
    grad.addColorStop(0, '#f39c12');
    grad.addColorStop(1, '#784212');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0, BASE_W, BASE_H);

    // 远山
    ctx.fillStyle = 'rgba(46, 26, 0, 0.3)';
    drawMountain(0, 500, 150, 0.5);
    drawMountain(300, 500, 200, 0.4);
    
    // 宝塔
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(100, 300, 40, 150);
    ctx.fillRect(BASE_W-140, 280, 40, 170);

    // 底部薄雾
    let mist = ctx.createLinearGradient(0, 550, 0, BASE_H);
    mist.addColorStop(0, 'rgba(255,255,255,0)');
    mist.addColorStop(1, 'rgba(255,255,255,0.3)');
    ctx.fillStyle = mist;
    ctx.fillRect(0, 550, BASE_W, 150);
}

function drawMountain(x, y, h, speed) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + 200, y - h);
    ctx.lineTo(x + 400, y);
    ctx.fill();
}

function drawPlatform(x, y) {
    ctx.save();
    ctx.translate(x, y);
    // 草皮
    ctx.fillStyle = '#27ae60';
    ctx.beginPath(); ctx.ellipse(0, 0, 100, 20, 0, 0, Math.PI*2); ctx.fill();
    // 岩石
    ctx.fillStyle = '#7f8c8d';
    ctx.beginPath();
    ctx.moveTo(-100, 0); ctx.quadraticCurveTo(0, 80, 100, 0); ctx.fill();
    ctx.restore();
}

function drawHUD() {
    // 顶部记分
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, BASE_W/2 - 100, 20, 200, 60, 10, true);
    ctx.fillStyle = '#fff';
    ctx.font = '16px Arial'; ctx.textAlign = 'center';
    ctx.fillText("排位赛", BASE_W/2, 40);
    ctx.font = 'bold 24px Arial';
    ctx.fillText(`${score.player} : ${score.ai}`, BASE_W/2, 65);

    // 玩家信息 (左)
    drawInfoPanel(40, 30, player, "哪吒", "哪", "#c0392b");
    // AI 信息 (右)
    drawInfoPanel(BASE_W - 300, 30, ai, "武松", "武", "#2980b9");
}

function drawInfoPanel(x, y, char, name, head, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    roundRect(ctx, 0, 0, 260, 80, 10, true, true);

    // 头像
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(40, 40, 30, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '30px Ma Shan Zheng'; ctx.textAlign = 'center';
    ctx.fillText(head, 40, 50);

    // 名字和等级
    ctx.textAlign = 'left'; ctx.font = '18px Arial';
    ctx.fillText(name, 85, 30);
    ctx.fillStyle = '#2ecc71'; ctx.font = '12px Arial';
    ctx.fillText("等级 10", 130, 30);

    // 血条
    ctx.fillStyle = '#333';
    ctx.fillRect(85, 45, 150, 15);
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(85, 45, 150 * (char.hp / 600), 15);
    ctx.fillStyle = '#fff'; ctx.font = '10px Arial';
    ctx.fillText(`${char.hp}/600`, 140, 56);

    // 生命心
    for(let i=0; i<3; i++) {
        ctx.font = '20px Arial';
        ctx.fillText(i < char.lives ? "❤️" : "🖤", 85 + i*25, 75);
    }
    ctx.restore();
}

function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
}

// 启动
init();
</script>
