<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>武侠标枪对决</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #222;
            font-family: "Microsoft YaHei", "STKaiti", serif;
            user-select: none;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #ffd700, #ff8c00);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* 横屏提示 */
        #rotatePrompt {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #8B0000;
            color: #FFD700;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        @media screen and (orientation: portrait) {
            #rotatePrompt { display: flex; }
        }
        .ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="rotatePrompt">
        <h1>请旋转设备至横屏模式</h1>
        <p>为了最佳武侠对决体验，请锁定横屏</p>
    </div>
</div>

<script>
/**
 * 武侠标枪对决 - 核心逻辑
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 游戏配置
const config = {
    gravity: 0.15,
    maxPower: 18,
    playerLives: 3,
    aiLives: 3,
    scale: 1.0, // 动态缩放
    charScale: 2.0, // 角色放大倍率
    groundY: 0.8
};

// 游戏状态
let gameState = 'IDLE'; // IDLE, CHARGING, PLAYER_FLYING, AI_THINKING, AI_FLYING, GAMEOVER
let score = { player: 0, ai: 0 };
let particles = [];
let screenShake = 0;
let time = 0;

// 资源/对象
let player, ai, spear, currentTurn = 'PLAYER';

class Character {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.baseY = y;
        this.type = type; // 'nezha' or 'wusong'
        this.lives = 3;
        this.angle = type === 'nezha' ? -Math.PI/4 : Math.PI + Math.PI/4;
        this.power = 0;
        this.width = 40 * config.charScale;
        this.height = 60 * config.charScale;
        this.floatingOffset = 0;
    }

    draw(ctx) {
        const bounce = Math.sin(time * 0.05) * 5;
        this.floatingOffset = bounce;
        const cx = this.x;
        const cy = this.y + bounce;

        ctx.save();
        ctx.translate(cx, cy);

        // 绘制浮空平台
        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.ellipse(0, this.height/2 + 10, 50, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 3;
        ctx.stroke();

        // 角色缩放绘制
        const s = config.charScale;
        
        if (this.type === 'nezha') {
            // 哪吒造型
            // 红绸带 (动态飘动)
            ctx.strokeStyle = '#ff4500';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-10, 0);
            for(let i=0; i<10; i++) {
                ctx.lineTo(-20 - i*5, Math.sin(time*0.1 + i)*10);
            }
            ctx.stroke();

            // 身体
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(-10*s, -20*s, 20*s, 30*s);
            // 头部
            ctx.fillStyle = '#ffe0bd';
            ctx.beginPath();
            ctx.arc(0, -30*s, 12*s, 0, Math.PI*2);
            ctx.fill();
            // 丸子头
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-10*s, -40*s, 6*s, 0, Math.PI*2);
            ctx.arc(10*s, -40*s, 6*s, 0, Math.PI*2);
            ctx.fill();
            // 火焰珠
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(0, -33*s, 2*s, 0, Math.PI*2);
            ctx.fill();
        } else {
            // 武松造型
            // 身体
            ctx.fillStyle = '#2980b9';
            ctx.fillRect(-10*s, -20*s, 20*s, 35*s);
            // 头部
            ctx.fillStyle = '#ffe0bd';
            ctx.beginPath();
            ctx.arc(0, -32*s, 13*s, 0, Math.PI*2);
            ctx.fill();
            // 头巾/发髻
            ctx.fillStyle = '#333';
            ctx.fillRect(-14*s, -42*s, 28*s, 10*s); // 头巾
            ctx.beginPath();
            ctx.arc(0, -45*s, 5*s, 0, Math.PI*2); // 发髻
            ctx.fill();
            // 鬓角
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#333';
            ctx.strokeRect(-13*s, -30*s, 2*s, 10*s);
            ctx.strokeRect(11*s, -30*s, 2*s, 10*s);
        }

        ctx.restore();
    }
}

class Spear {
    constructor(x, y, angle, power, owner) {
        this.x = x;
        this.y = y;
        this.vx = Math.cos(angle) * power;
        this.vy = Math.sin(angle) * power;
        this.angle = angle;
        this.owner = owner;
        this.active = true;
        this.trail = [];
        this.length = 60;
    }

    update() {
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 10) this.trail.shift();

        this.x += this.vx;
        this.y += this.vy;
        this.vy += config.gravity;
        this.angle = Math.atan2(this.vy, this.vx);

        // 边界检查
        if (this.y > canvas.height || this.x < 0 || this.x > canvas.width) {
            this.active = false;
        }
    }

    draw(ctx) {
        // 拖影
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 2;
        this.trail.forEach((p, i) => {
            if(i===0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();

        // 标枪本体
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        // 枪柄
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-this.length/2, 0);
        ctx.lineTo(this.length/2, 0);
        ctx.stroke();
        
        // 枪头
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath();
        ctx.moveTo(this.length/2, 0);
        ctx.lineTo(this.length/2 - 15, -6);
        ctx.lineTo(this.length/2 - 15, 6);
        ctx.fill();
        
        // 装饰红缨
        ctx.fillStyle = 'red';
        ctx.fillRect(this.length/2 - 20, -3, 5, 6);

        ctx.restore();
    }
}

// 粒子特效
function createExplosion(x, y) {
    for (let i = 0; i < 20; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 1.0,
            color: Math.random() > 0.5 ? '#ff4500' : '#ffd700'
        });
    }
    screenShake = 15;
}

function init() {
    resize();
    player = new Character(canvas.width * 0.2, canvas.height * config.groundY, 'nezha');
    ai = new Character(canvas.width * 0.8, canvas.height * config.groundY, 'wusong');
    requestAnimationFrame(update);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (player) {
        player.x = canvas.width * 0.2;
        player.y = canvas.height * config.groundY;
        ai.x = canvas.width * 0.8;
        ai.y = canvas.height * config.groundY;
    }
}

window.addEventListener('resize', resize);

// 输入控制
let isMouseDown = false;
let startX, startY;

canvas.addEventListener('mousedown', startCharge);
canvas.addEventListener('touchstart', (e) => startCharge(e.touches[0]));

function startCharge(e) {
    if (gameState !== 'IDLE' || currentTurn !== 'PLAYER') return;
    
    // 限制在左侧区域触发
    if (e.clientX > canvas.width / 2) return;

    isMouseDown = true;
    startX = e.clientX;
    startY = e.clientY;
    gameState = 'CHARGING';
}

window.addEventListener('mousemove', (e) => handleMove(e));
window.addEventListener('touchmove', (e) => handleMove(e.touches[0]));

function handleMove(e) {
    if (!isMouseDown) return;
    
    // 计算角度：基于上下滑动偏移
    const dy = e.clientY - startY;
    player.angle = -Math.PI/6 + (dy / 200); // 映射滑动到角度
    
    // 蓄力：基于按住时长或简单增量
    player.power = Math.min(config.maxPower, player.power + 0.15);
}

window.addEventListener('mouseup', releaseSpear);
window.addEventListener('touchend', releaseSpear);

function releaseSpear() {
    if (!isMouseDown) return;
    isMouseDown = false;
    
    if (gameState === 'CHARGING') {
        spear = new Spear(player.x, player.y + player.floatingOffset - 40, player.angle, player.power + 5, 'PLAYER');
        gameState = 'PLAYER_FLYING';
        player.power = 0;
    }
}

// AI 逻辑
function aiTurn() {
    gameState = 'AI_THINKING';
    setTimeout(() => {
        // 计算完美角度 (抛物线逆推简化版)
        const dx = player.x - ai.x;
        const dy = player.y - ai.y;
        const dist = Math.abs(dx);
        
        // 基础角度并加入随机误差
        let targetAngle = Math.PI + Math.PI/6; 
        const error = (Math.random() - 0.5) * 0.25;
        const power = 12 + Math.random() * 5;

        spear = new Spear(ai.x, ai.y + ai.floatingOffset - 40, targetAngle + error, power, 'AI');
        gameState = 'AI_FLYING';
    }, 1500);
}

function update() {
    time++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 绘制背景 (金山水)
    const grad = ctx.createLinearGradient(0,0,0, canvas.height);
    grad.addColorStop(0, '#ffd700');
    grad.addColorStop(1, '#e67e22');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0, canvas.width, canvas.height);

    // 绘制远山宝塔
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.8);
    ctx.lineTo(200, canvas.height * 0.5);
    ctx.lineTo(400, canvas.height * 0.8);
    ctx.fill();
    // 简易宝塔剪影
    ctx.fillRect(canvas.width * 0.7, canvas.height * 0.4, 40, 100);

    // 震屏处理
    if (screenShake > 0) {
        ctx.translate(Math.random()*screenShake, Math.random()*screenShake);
        screenShake *= 0.9;
    }

    // 更新和绘制标枪
    if (spear && spear.active) {
        spear.update();
        spear.draw(ctx);

        // 碰撞检测
        let target = (spear.owner === 'PLAYER') ? ai : player;
        let dist = Math.hypot(spear.x - target.x, spear.y - (target.y + target.floatingOffset - 30));
        
        if (dist < 40) {
            target.lives--;
            createExplosion(spear.x, spear.y);
            spear.active = false;
            checkGameOver();
        }
    } else if (gameState === 'PLAYER_FLYING' || gameState === 'AI_FLYING') {
        // 标枪落地或飞走后切换回合
        if (currentTurn === 'PLAYER') {
            currentTurn = 'AI';
            aiTurn();
        } else {
            currentTurn = 'PLAYER';
            gameState = 'IDLE';
        }
        spear = null;
    }

    // 绘制角色
    player.draw(ctx);
    ai.draw(ctx);

    // 绘制 UI
    drawUI();

    // 绘制瞄准线
    if (gameState === 'CHARGING') {
        drawAimAssist(player);
    }

    // 粒子更新
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
    particles = particles.filter(p => p.life > 0);
    ctx.globalAlpha = 1.0;

    requestAnimationFrame(update);
}

function drawAimAssist(char) {
    ctx.save();
    ctx.setLineDash([5, 10]);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.moveTo(char.x, char.y + char.floatingOffset - 40);
    const endX = char.x + Math.cos(char.angle) * 150;
    const endY = char.y + char.floatingOffset - 40 + Math.sin(char.angle) * 150;
    ctx.lineTo(endX, endY);
    ctx.stroke();

    // 红色准星
    ctx.strokeStyle = 'red';
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(endX, endY, 10, 0, Math.PI*2);
    ctx.moveTo(endX-15, endY); ctx.lineTo(endX+15, endY);
    ctx.moveTo(endX, endY-15); ctx.lineTo(endX, endY+15);
    ctx.stroke();

    // 蓄力条 (红金色)
    const barW = 100;
    const powerPct = char.power / config.maxPower;
    ctx.fillStyle = '#333';
    ctx.fillRect(char.x - 50, char.y + 60, barW, 10);
    let color = '#00ff00';
    if(powerPct > 0.4) color = '#ffff00';
    if(powerPct > 0.8) color = '#ff0000';
    ctx.fillStyle = color;
    ctx.fillRect(char.x - 50, char.y + 60, barW * powerPct, 10);
    ctx.fillStyle = '#fff';
    ctx.font = '12px Arial';
    ctx.fillText(Math.floor(powerPct * 100) + '%', char.x - 10, char.y + 85);
    ctx.restore();
}

function drawUI() {
    // 顶部计分板
    ctx.fillStyle = 'rgba(139, 0, 0, 0.8)'; // 深红
    ctx.fillRect(canvas.width/2 - 100, 20, 200, 50);
    ctx.strokeStyle = '#FFD700'; // 金
    ctx.lineWidth = 3;
    ctx.strokeRect(canvas.width/2 - 100, 20, 200, 50);
    
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px "STKaiti", cursive';
    ctx.textAlign = 'center';
    ctx.fillText(`${score.player}  排位赛  ${score.ai}`, canvas.width/2, 53);

    // 双方头像及血量
    drawLifeBar(50, 40, '哪吒 Lv.10', player.lives, true);
    drawLifeBar(canvas.width - 250, 40, '武松 Lv.12', ai.lives, false);
}

function drawLifeBar(x, y, name, lives, isPlayer) {
    ctx.save();
    // 名字
    ctx.fillStyle = '#8B0000';
    ctx.font = '20px "STKaiti"';
    ctx.textAlign = isPlayer ? 'left' : 'right';
    ctx.fillText(name, isPlayer ? x + 60 : x + 140, y + 20);

    // 爱心生命
    for(let i=0; i<3; i++) {
        ctx.fillStyle = i < lives ? '#ff0000' : '#444';
        const hx = isPlayer ? x + 60 + i*30 : x + 140 - (i+1)*30;
        ctx.beginPath();
        ctx.arc(hx, y + 40, 8, 0, Math.PI*2);
        ctx.fill();
    }

    // 头像框
    ctx.strokeStyle = '#FFD700';
    ctx.fillStyle = '#600';
    ctx.beginPath();
    ctx.arc(isPlayer ? x + 25 : x + 175, y + 30, 30, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
}

function checkGameOver() {
    if (player.lives <= 0 || ai.lives <= 0) {
        gameState = 'GAMEOVER';
        setTimeout(() => {
            if (player.lives <= 0) score.ai++;
            else score.player++;
            alert(player.lives <= 0 ? "胜败乃兵家常事，大侠请重新来过！" : "武林至尊，宝刀未老！你赢了！");
            player.lives = 3;
            ai.lives = 3;
            gameState = 'IDLE';
            currentTurn = 'PLAYER';
        }, 500);
    }
}

// 启动
init();
</script>
</body>
</html>
